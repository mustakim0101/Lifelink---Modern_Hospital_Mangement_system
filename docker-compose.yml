services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: lifelink_app
    working_dir: /var/www/html
    volumes:
      - ./lifelink-app:/var/www/html
    depends_on:
      - mssql

  web:
    image: nginx:1.27-alpine
    container_name: lifelink_web
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - ./lifelink-app:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: lifelink_mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      SA_PASSWORD: "${MSSQL_SA_PASSWORD:?MSSQL_SA_PASSWORD is required}"
    ports:
      - "${MSSQL_PORT:-1433}:1433"
    volumes:
      - mssql_data:/var/opt/mssql

  mssql-init:
    image: mcr.microsoft.com/mssql-tools
    container_name: lifelink_mssql_init
    depends_on:
      - mssql
    volumes:
      - ./docker/mssql/init:/init:ro
    entrypoint: /bin/bash
    command: >
      -c "
      sleep 25;
      /opt/mssql-tools/bin/sqlcmd -S mssql -U sa -P ${MSSQL_SA_PASSWORD:?MSSQL_SA_PASSWORD is required} -i /init/01-init.sql
      "

volumes:
  mssql_data:
