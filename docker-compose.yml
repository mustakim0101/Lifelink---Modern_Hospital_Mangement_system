services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: lifelink_app
    working_dir: /var/www/html
    volumes:
      - ./lifelink-app:/var/www/html
    depends_on:
      mssql:
        condition: service_healthy

  web:
    image: nginx:1.27-alpine
    container_name: lifelink_web
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - ./lifelink-app:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: lifelink_mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      SA_PASSWORD: "${MSSQL_SA_PASSWORD:?MSSQL_SA_PASSWORD is required}"
    ports:
      - "${MSSQL_PORT:-1433}:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/1433'"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s

  mssql-init:
    image: mcr.microsoft.com/mssql-tools
    container_name: lifelink_mssql_init
    depends_on:
      mssql:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:?MSSQL_SA_PASSWORD is required}"
    volumes:
      - ./docker/mssql/init:/init:ro
    entrypoint: /bin/bash
    command: /init/init-db.sh

volumes:
  mssql_data:
